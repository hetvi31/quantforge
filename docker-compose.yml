version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quantforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quantforge}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quantforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  prometheus:
    image: prom/prometheus:latest
    container_name: quantforge-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana:latest
    container_name: quantforge-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: quantforge-gateway
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-quantforge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8000
      - GROQ_API_KEY=${GROQ_API_KEY}

    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  matching-engine:
    build:
      context: .
      dockerfile: matching_engine/Dockerfile
    container_name: quantforge-matching-engine
    restart: unless-stopped
    ports:
      - "9001:9001"
    depends_on:
      - redis

  feed-handler:
    build:
      context: .
      dockerfile: feed_handler/Dockerfile
    container_name: quantforge-feed-handler
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "9002:9002/udp"
    depends_on:
      - redis

  ai-research:
    build:
      context: ./ai_research
      dockerfile: Dockerfile
    container_name: quantforge-ai-research
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - GATEWAY_URL=http://gateway:8000
    ports:
      - "8001:8001"
    depends_on:
      - gateway

  terminal:
    build:
      context: ./terminal
      dockerfile: Dockerfile
    container_name: quantforge-terminal
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - gateway




volumes:
  pgdata:
  redisdata:
