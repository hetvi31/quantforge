services:

  postgres:
    image: postgres:15-alpine
    container_name: quantforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quantforge}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-quantforge}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: quantforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  matching-engine:
    build:
      context: .
      dockerfile: matching_engine/Dockerfile
    container_name: quantforge-matching-engine
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "9001:9001"
    depends_on:
      redis:
        condition: service_healthy

  feed-handler:
    build:
      context: .
      dockerfile: feed_handler/Dockerfile
    container_name: quantforge-feed-handler
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "9002:9002/udp"
    depends_on:
      redis:
        condition: service_healthy

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: quantforge-gateway
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-quantforge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FEED_HOST=matching-engine
      - FEED_TCP_PORT=9001
      - API_KEY=${API_KEY:-quantforge-dev-key}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3001}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      matching-engine:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ai-research:
    build:
      context: ./ai_research
      dockerfile: Dockerfile
    container_name: quantforge-ai-research
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - GATEWAY_URL=http://gateway:8000
      - API_KEY=${API_KEY:-quantforge-dev-key}
    ports:
      - "8001:8001"
    depends_on:
      gateway:
        condition: service_healthy

  terminal:
    build:
      context: ./terminal
      dockerfile: Dockerfile
    container_name: quantforge-terminal
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      gateway:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    container_name: quantforge-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      gateway:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: quantforge-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafanadata:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  grafanadata:
