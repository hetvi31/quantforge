syntax = "proto3";

package quantforge;

// NOTE: The live gateway <-> engine transport uses the compact fixed-layout
// binary structs in shared/cpp/WireProtocol.hpp (and their Python mirror in
// gateway/app/protocol.py). This .proto documents the same message shapes in a
// schema-first form and is the basis for any future gRPC/protobuf transport.
// Prices are integer ticks (see PRICE_SCALE in WireProtocol.hpp).

enum ProtobufOrderSide {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

enum ProtobufOrderType {
  TYPE_UNSPECIFIED = 0;
  TYPE_LIMIT = 1;
  TYPE_MARKET = 2;
  TYPE_STOP = 3;
}

enum ProtobufOrderStatus {
  STATUS_UNSPECIFIED = 0;
  STATUS_NEW = 1;
  STATUS_PARTIALLY_FILLED = 2;
  STATUS_FILLED = 3;
  STATUS_CANCELLED = 4;
  STATUS_REJECTED = 5;
}

message ProtobufOrderRequest {
  uint64 client_order_id = 1;
  string symbol = 2;
  ProtobufOrderSide side = 3;
  ProtobufOrderType type = 4;
  int64 price_ticks = 5;
  uint64 quantity = 6;
  uint64 timestamp = 7;
}

message ProtobufExecutionReport {
  uint64 order_id = 1;
  uint64 client_order_id = 2;
  string symbol = 3;
  ProtobufOrderSide side = 4;
  ProtobufOrderStatus status = 5;
  int64 price_ticks = 6;
  uint64 last_quantity = 7;
  uint64 cumulative_quantity = 8;
  uint64 remaining_quantity = 9;
  uint64 timestamp = 10;
  string reject_reason = 11;
}

message PriceLevel {
  int64 price_ticks = 1;
  uint64 quantity = 2;
}

message ProtobufMarketDepthUpdate {
  string symbol = 1;
  repeated PriceLevel bids = 2;
  repeated PriceLevel asks = 3;
  uint64 timestamp = 4;
}
